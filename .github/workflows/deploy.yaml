name: Deploy Node JS Simple

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ssh key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Deploy Process
        run: |
          # 1. Masuk ke VPS dan jalankan perintah
          ssh -p "${{ secrets.PORT }}" ${{ secrets.USERNAME }}@${{ secrets.HOST }} "
            set -e
            # Load NVM (Wajib agar npm/node terbaca)
            export NVM_DIR=\"\$HOME/.nvm\"
            [ -s \"\$NVM_DIR/nvm.sh\" ] && \. \"\$NVM_DIR/nvm.sh\"

            # Pastikan folder tujuan ada
            mkdir -p /var/www/anonim-chat
            cd /var/www/anonim-chat

            # Jika belum ada .git di sana, clone dulu. Jika sudah ada, pull.
            if [ ! -d \".git\" ]; then
              cd ..
              rm -rf anonim-chat
              git clone git@github.com:${{ github.repository }}.git anonim-chat
              cd anonim-chat
            else
              git fetch --all
              git reset --hard origin/main
            fi

            # Install & Update dependensi
            npm install --production

            # Restart PM2
            pm2 restart anonim-chat || pm2 start index.js --name \"anonim-chat\"
          "